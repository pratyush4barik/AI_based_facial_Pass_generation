services:
  db:
    image: pgvector/pgvector:pg17
    container_name: pgvec1
    environment:
      POSTGRES_DB: visit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "55432:5432"
    volumes:
      - pgvec1:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d visit_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvec1:
