<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit — Visitor Pass Management Portal</title>
    <meta name="description" content="Edit visitor details.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../register_page/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Thin top breadcrumb strip -->
    <header class="mini-header" aria-label="Breadcrumb">
        <span>Login portal &gt; Edit</span>
    </header>

    <!-- Banner -->
    <section class="banner" aria-label="Portal banner">
        <div class="banner__overlay"></div>
    </section>

    <div class="app" id="appRoot">
        <!-- Sidebar navigation -->
        <div class="sidebar">
            <a href="#" class="menu-item">
                <span>Register</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="#" class="menu-item active">
                <span>Edit</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="#" class="menu-item">
                <span>Model</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="#" class="menu-item">
                <span>Pass Print</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="#" class="menu-item">
                <span>Admin Codes</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="#" class="menu-item">
                <span>Blacklist</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <div class="spacer"></div>
            <a id="logoutButton" class="logout">Log Out</a>
        </div>

        <div class="overlay" id="sidebarOverlay" hidden></div>

        <main class="main">
            <!-- Topbar (Main Content Area Header) -->
            <header class="topbar">
                <div class="topbar__left">
                    <div>
                        <h2>Edit</h2>
                    </div>
                </div>
                <div class="topbar__right">
                    <div class="profile" id="profileWidget">
                        <button class="profile__button" type="button" id="profileToggle" aria-haspopup="true" aria-expanded="false">
                            <span>
                                <small id="profileUsername">abc@gmail.com</small>
                                <strong id="profileName">ABC Name</strong>
                            </span>
                            <img alt="Profile picture" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%230B5ED7'/%3E%3Cstop offset='1' stop-color='%230B3C7D'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='200' height='200' rx='100' fill='url(%23g)'/%3E%3Ccircle cx='100' cy='82' r='36' fill='white' fill-opacity='.95'/%3E%3Cpath d='M40 180c13-40 41-61 60-61s47 21 60 61' fill='white' fill-opacity='.28'/%3E%3C/svg%3E">
                        </button>
                        <div class="profile__menu" id="profileMenu" hidden>
                            <button type="button">View profile</button>
                            <button type="button">Account settings</button>
                            <button type="button" id="profileLogout">Sign out</button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dashboard content -->
            <section class="content-card">
                <div class="edit-page">
                    
                    <!-- Search Bar Section -->
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search" aria-label="Search">
                        <button type="button" id="searchBtn" class="search-btn" aria-label="Submit search">
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>

                    <!-- Data Table -->
                    <div class="table-card" id="editTableCard">
                        <table>
                            <thead>
                                <tr>
                                    <th>EMP ID</th>
                                    <th>Name</th>
                                    <th>Addhaar No.</th>
                                    <th>Edited by</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="editTableBody">
                                <!-- Example Row -->
                                <tr>
                                    <td>EMP-001</td>
                                    <td>John Doe</td>
                                    <td>123456789012</td>
                                    <td>Admin User</td>
                                    <td>
                                        <button class="btn-edit-pill" id="editBtn_1">Edit</button>
                                    </td>
                                </tr>
                                <!-- Empty Rows for Structure -->
                                <tr>
                                    <td>—</td>
                                    <td>—</td>
                                    <td>—</td>
                                    <td>—</td>
                                    <td>—</td>
                                </tr>
                                <tr>
                                    <td>—</td>
                                    <td>—</td>
                                    <td>—</td>
                                    <td>—</td>
                                    <td>—</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <!-- We link to register_page/script.js to inherit the sidebar and common logic -->
    <script src="script.js"></script>
</body>
</html>
