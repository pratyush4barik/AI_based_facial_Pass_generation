<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model — Visitor Pass Management Portal</title>
    <meta name="description" content="Live camera feed, face detection, and data monitoring for the Visitor Pass Management Portal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../register_page/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Thin top breadcrumb strip -->
    <header class="mini-header" aria-label="Breadcrumb">
        <span>Login portal &gt; Model</span>
    </header>

    <!-- Banner -->
    <section class="banner" aria-label="Portal banner">
        <div class="banner__overlay"></div>
    </section>

    <div class="app" id="appRoot">
        <!-- Sidebar navigation -->
        <div class="sidebar">
            <a href="../register_page/index.html" class="menu-item">
                <span>Register</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="../edit_page/index.html" class="menu-item">
                <span>Edit</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="../model_page/index.html" class="menu-item active">
                <span>Model</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="../print_page/index.html" class="menu-item">
                <span>Pass Print</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="../admin_codes_page/index.html" class="menu-item">
                <span>Admin Codes</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <a href="../blacklist_page/index.html" class="menu-item">
                <span>Blacklist</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <div class="spacer"></div>
            <a id="logoutButton" class="logout">Log Out</a>
        </div>

        <div class="overlay" id="sidebarOverlay" hidden></div>

        <main class="main">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar__left">
                    <div><h2>Model :-</h2></div>
                </div>
                <div class="topbar__right">
                    <div class="profile" id="profileWidget">
                        <button class="profile__button" type="button" id="profileToggle" aria-haspopup="true" aria-expanded="false">
                            <span>
                                <small id="profileUsername">abc@gmail.com</small>
                                <strong id="profileName">ABC Name</strong>
                            </span>
                            <img alt="Profile picture" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%230B5ED7'/%3E%3Cstop offset='1' stop-color='%230B3C7D'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='200' height='200' rx='100' fill='url(%23g)'/%3E%3Ccircle cx='100' cy='82' r='36' fill='white' fill-opacity='.95'/%3E%3Cpath d='M40 180c13-40 41-61 60-61s47 21 60 61' fill='white' fill-opacity='.28'/%3E%3C/svg%3E">
                        </button>
                        <div class="profile__menu" id="profileMenu" hidden>
                            <button type="button">View profile</button>
                            <button type="button">Account settings</button>
                            <button type="button" id="profileLogout">Sign out</button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dashboard content -->
            <section class="content-card">
                <div class="model-page">

                    <!-- 2-Column Grid Layout -->
                    <div class="model-grid">

                        <!-- =============================== -->
                        <!-- LEFT COLUMN: Camera Feed        -->
                        <!-- =============================== -->
                        <div class="camera-column">
                            <div class="camera-feed" id="cameraFeed">
                                <img
                                    class="camera-stream"
                                    id="cameraStream"
                                    src="http://127.0.0.1:8000/model/camera-feed"
                                    alt="Live camera feed"
                                >
                                <!-- Placeholder face silhouette -->
                                <div class="camera-placeholder" id="cameraPlaceholder">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <!-- Viewfinder overlay -->
                                <div class="camera-viewfinder">
                                    <div class="vf-corner vf-tl"></div>
                                    <div class="vf-corner vf-tr"></div>
                                    <div class="vf-corner vf-bl"></div>
                                    <div class="vf-corner vf-br"></div>
                                </div>
                                <!-- Status Bar at bottom -->
                                <div class="camera-status-bar" id="detectionStatus">
                                    <span class="status-dot pulsing"></span>
                                    <span class="status-bar-text" id="statusText">FACE DETECTED</span>
                                </div>
                            </div>
                        </div>

                        <!-- =============================== -->
                        <!-- RIGHT COLUMN: Data Tables       -->
                        <!-- =============================== -->
                        <div class="tables-column">

                            <!-- Top Table: Users Logged In -->
                            <div class="data-table-card" id="usersLoggedInCard">
                                <table id="usersLoggedInTable">
                                    <thead>
                                        <tr>
                                            <th class="col-sl">Sl no.</th>
                                            <th>Emp_Id of Users Logged In</th>
                                        </tr>
                                    </thead>
                                    <tbody id="checkedInTableBody">
                                        <tr>
                                            <td colspan="2" class="table-message">Waiting for detection...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <!-- Bottom Table: Printing Queue -->
                            <div class="data-table-card" id="printingQueueCard">
                                <table id="printingQueueTable">
                                    <thead>
                                        <tr>
                                            <th class="col-sl">Sl no.</th>
                                            <th>Emp_Id of Printing Queue</th>
                                        </tr>
                                    </thead>
                                    <tbody id="printingQueueTableBody">
                                        <tr>
                                            <td colspan="2" class="table-message">Print queue is empty.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                        </div>
                    </div>

                </div>
            </section>
        </main>
    </div>

    <div class="duration-modal" id="durationModal" aria-hidden="true">
        <div class="duration-modal__content">
            <h3>End Duration</h3>
            <p id="durationVisitorText">Visitor detected.</p>
            <label for="durationHoursInput">Hours</label>
            <input id="durationHoursInput" type="number" min="0.1" step="0.1" value="1">
            <div class="duration-modal__actions">
                <button type="button" class="btn-duration-primary" id="confirmDurationBtn">Start Pass</button>
                <button type="button" class="btn-duration-secondary" id="cancelDurationBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../common.js"></script>
    <script src="script.js"></script>
</body>
</html>
